<svg width="70" height="70" viewBox="0 0 170 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glow effect definition -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4aa5f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44c2c2;stop-opacity:1" />
    </linearGradient>
  
  </defs>
  
  <!-- Icon/Symbol - Centered -->
  <g transform="translate(0, 0)">
    <!-- Outer hexagon frame -->
    <path d="M 35 5 L 60 20 L 60 50 L 35 65 L 10 50 L 10 20 Z" 
          stroke="url(#neonGradient)" 
          stroke-width="2.5" 
          fill="none"
          filter="url(#glow)"
          opacity="0.9"/>
    
    <!-- Inner geometric shape -->
    <path d="M 35 15 L 50 25 L 50 45 L 35 55 L 20 45 L 20 25 Z" 
          fill="url(#neonGradient)" 
          opacity="0.15"/>
    
    <!-- Central N letter stylized -->
    <path d="M7 22V11M2 13V20C2 21.1046 2.89543 22 4 22H17.4262C18.907 22 20.1662 20.9197 20.3914 19.4562L21.4683 12.4562C21.7479 10.6389 20.3418 9 18.5032 9H15C14.4477 9 14 8.55228 14 8V4.46584C14 3.10399 12.896 2 11.5342 2C11.2093 2 10.915 2.1913 10.7831 2.48812L7.26394 10.4061C7.10344 10.7673 6.74532 11 6.35013 11H4C2.89543 11 2 11.8954 2 13Z" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <path d="M 28 28 L 28 42 L 30 42 L 30 32 L 40 42 L 42 42 L 42 28 L 40 28 L 40 38 L 30 28 Z" 
          fill="url(#neonGradient)"
          filter="url(#glow)"/>
    
    <!-- Accent lines -->
    <line x1="35" y1="5" x2="35" y2="15" 
          stroke="url(#neonGradient)" 
          stroke-width="2"
          opacity="0.6"
          filter="url(#glow)"/>
    
    <circle cx="35" cy="35" r="1.5" fill="#44c2c2" filter="url(#glow)"/>
  </g>
</svg>
